  text: 上清金真玉皇上元九天真靈三百六十五部元籙集五金明曰七真先以癸亥歲五月五日午時受太上玉晨君上元靈録於今九載七真寶録以攝神氣未嘗虧誕神文也七真重以今太清五年太歲辛未五月一日午時高上天寶玉皇降真於帶嶺瓊宫之中重為七真品定上元九天真靈玄録官將位號於是正焉金明曰是時高上天寶玉皇金口訣言告於七真言此上元九天真靈三百六十五部將軍玄録天官者皆非後學而為之也其真即上元飛凝清真生靈妙氣而應自然明運成為真人矣服即自然五色飛天羽衣形皆金剛身長三千餘丈其所部官將者齊服自然三色飛青羽仙之衣常鎮九天上元以輔三十六真皇治也所以法應天地四象玉關璇璣三百六十五正度之數也亦法鎮九晨三光七曜星宿九宫八卦三百六十五度正位也亦法天地四時三百六十五氣之始也中以法鎮天人形斡三百六十五關節臟腑之數也上即主運天地正氣中即扶命天帝皇基國君明祚明三元御運明化於賢劫也下拯三界於群生開真法門於大光度天人於福橋濟八難於苦海拔三塗於六道救疾世於玄録防天災於靈官度九厄於神功衛兆身於天兵保福祚於歷劫禳十惡於天堂擁毒鬼於神將制衆魔於天真却衆禍於靈吏伏衆精於天威戳群妖於神力滅水火於神智消穢氣於碧水掃囂塵於金風保兆形於妙氣治百病於天醫鎮兆關節於真精也是以其功無所不周無所不匝法象天地人之度量也常隨明運下教度人於季劫矣保無為於將來也其法當興於靈龍之世也爾時國君行道修德是其運也帝祚太平是其功也天人命不夭傷是其福也高上有言當斯之隆即是萬道勢訖玄範是興大乘運行則保兆天年得以三元等矣可謂自然之功開度亦復不與為難者哉今故序此篇即以明之功乎後賢至人信尚之士可不奉而行焉上元真靈玄録係清玄無極真上元始天尊長明金真玉童治左清真玄氣九萬九千九百九十九重流明玉天真人右積陽真精元氣八萬八千八百八十八重金光寶耀真人中玄生靈清妙無央真氣百千萬重玉玄金元真人都領上景清虛生神妙氣九億九萬九千九百九十九重氣三十六洞天至真空玄丈人金明七真子今領高上天寶玉皇三十六治都監十方飛天神王總司九天三元太極上下周回四象下布萬靈普告無窮諸天靈官七真奉行正道上元九天真靈百八十三部玄録將軍兵士將吏等列位付授當依法度某身中安鎮形幹上中下三百六十五宫府營衛某身游行五方八極五嶽名山大澤三河四海江淮濟瀆鄉亭九州符廟里社虛空一切神祇咸當奉承律令助國扶命制御群神醫治萬兆救度天人某自受録之日不得違科犯約淫祀六天鬼神無辜殺害唯得依太真正典祠家先人若有犯淫盜不背真入僞為將軍兵士將吏所伺糾過之日某及七祖長充風刀萬劫無原一如真明勑令太無上元九天真靈元命十將軍官將兵士各十萬人太無上元九天真靈度命十將軍官將飛仙龍騎兵士各十萬人太無上元九天真靈防身十將軍官將兵士各十萬人太無上元九天真靈度厄十將軍官將飛仙龍騎兵士各十萬人太無上元九天真靈營身十將軍官將兵士各十萬人太無上元九天真靈左生氣十將軍官將飛虎騎兵士各十萬人太無上元九天真靈衛身十將軍官將兵士各十萬人太無上元九天真靈右生氣十將軍官將誅符破廟兵士各十萬人太無上元九天真靈藏形十將軍官將兵士各十萬人太無上元九天真靈中玄生氣十將軍官將攝召龍天兵士各十萬人太無上元九天真靈隱形十將軍官將兵士各十萬人太無上元九天真靈消灾考召十將軍官將兵士各十萬人太無上元九天真靈治病功曹十將軍官將兵士各十萬人太無上元九天真靈制神考召十將軍力士各十萬人太無上元九天真靈天醫功曹十將軍官將兵士各十萬人太無上元九天真靈考殺百鬼十將軍力士各十萬人太無上元九天真靈扶命形景十將軍官將兵士各十萬人太無上元九天真靈飛天白虎送章飛龍騎十將軍官將兵士各十萬人年號太歲某月某日子朔某郡縣鄉里王甲年如干歲今奉受上元九天真靈百八十三部玄録將軍兵士真官將吏等即列位付度某身將軍兵士衆官各當依位羅列某形內宫府周匝上下營身輔氣魂魄形影一合前防後衛左右制攝威風萬里千妖萬魔精靈鬼魅不正之神莫不摧崩毒刃咸來降化承真正道若有疆𦍙不伏凶神逆鬼悉付將軍兵士掃蕩自今以去行元布始猶守某身急急如上元九天真明律令
