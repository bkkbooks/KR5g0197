body:
  text: 卷内符並朱書金明七眞子奉行上元九天上靈百八十二部玄録將軍兵士天官將吏等合太无上元九天眞靈百八十三部玄録都合三百六十五部即以法象天地九晨三光七曜星宿四時五行九宫六甲八卦關璣正度璇天三元之數鎮常於人之身某今至心玄眞歸命三尊即理在可哀七眞子即日依科傳授上靈玄録將軍兵士天官將吏咸當依法鎮守某形上下游行五方八極五嶽名山大澤三河四海江淮濟瀆九州四域土地符廟里社鄉亭靈祇神爽皆當奉承符命制御十方共相營衛某身在在處處咸遵奉行若有凶神惡鬼欲來中害者將軍兵士依法刑戮不得稽留某若違科犯約淫盗禱祀六天鬼神爲天官所伺檢糺死受三官考掠之日不得怨師咎道一如九天眞明律令太玄上元九天上靈元命十將軍兵士各十萬人无上上元九天上靈飛騰天丁力士十將軍兵士各十萬人太玄上元九天上靈開度生神十將軍兵士各十萬人无上上元九天上靈飛騰誅符破廟金剛力士十將軍兵士各十萬人太玄上元九天上靈開度生靈十將軍兵士各十萬人无上上元九天上靈飛騰收魔伐殺力士十將軍兵士各十萬人太玄上元九天上靈開度生氣十將軍兵士各十萬人无上上元九天上靈飛騰收神食鬼力士十將軍兵士各十萬人太玄上元九天上靈周身耀電十將軍兵士各十萬人无上上元九天上靈飛騰收精食毒力士十將軍兵士各十萬人太玄上元九天上靈明威鎮身十將軍兵士各十萬人无上上元九天上靈飛天考召力士十將軍兵士各十萬人太玄上元九天上靈陽神正氣十將軍兵士各十萬人无上上元九天上靈飛天郎吏飛符攝召力士十將軍兵士各十萬人太玄上元九天上靈陰神正氣十將軍兵士各十萬人无上上元九天上靈飛天赤飄金軍羽郎使者十將軍兵士各十萬人太玄上元九天上靈保神護身十將軍兵士各十萬人无上上元九天上靈飛天白虎送章仙龍十將軍兵士各十萬人男女生弟子某至心歸命玄眞求受上元九天眞靈三百六十五部玄録七眞子即依法列位將軍兵士天官將吏以次付度某玄録並以飛玄三元延生靈符鎮於玄録以部制天官神兵今以普告天地五方八極九晨三光七耀諸天星宿四時五行九宫六甲八卦三官九府三界一切官屬皆當奉勑符命共相營衛某身保度三灾九戹五毒八難風刀水火五兵疾害得免衆苦凶禍年命得與三元同等千妖萬魔咸歸降化百惡消亡所願同期天官神兵長守某形三百六十五關闕宫府歷刼妙氣長存一如九天眞明律令右上元三百六十五眞靈玄録男女生同得受也更无别異耳某郡縣鄉里男女童子年如干歲即日貫玄衛身一將軍玄録奉行清眞玄氣急急如勑律令无上九天玉仙大將軍一人官將吏兵十萬衆金明七眞子今以童子一將軍玄録度某男女童子玄録自今以去某佩帶玄録神符天官吏兵咸共營衛鎮守某身防辟惡收妖斬邪五方八極凶神逆鬼天殃地祇空中游獵衆精魍魎一切靈爽雲消諸天善神土地眞官皆當奉承符命長相衛護若有疆𦍙鬼神欲中害之者將軍吏兵收斬不得稽留急急如九天眞明律令某年號月朔日子時奉行右男女童子録文度治錄吏兵儀次登壇東向再拜次三捻香次鳴法皷二十四通次發爐清玄无極眞上三天玄元始炁无極大道太上老君左右香官飛仙驛龍乘騎捧香使者飛天龍騎五帝侍香玉童玉女等各二十四人出上啓虚无自然元始天尊七眞正爾燒香奉表付度法事願得太上十方正眞生炁降七眞等身中所啓逕上无極大道至眞玉皇御前畢即再拜長跪香案前出官奉表付度謹出金明七眞身中五體眞官功曹使者各二人出上元九天功曹官各二人出上元九天昇玄功曹官各二人出上元九天正一功曹官各二人出上元九天左玄眞明功曹官各二人出上元九天右玄太眞功曹官各二人出上元九天陽神正一功曹官各二人出上元九天陰神正一功曹官各二人出上元九天仙都治病功曹官各二人出无上上元九天上靈飛天白虎送章仙龍騎吏官各二人出謹出七眞身中眞官使者仙都直眞符吏領仙郡官使者各千二百人出嚴莊整服𠜍帶垂纓各整天眞羽儀羅列四面八方營衛左右前後流明曜電掃除不祥玄鑒玄奏付度法事今有某郡縣鄉里男女生等如干人投辭玄眞至心歸命三尊求受上元九天眞靈三百六十五部玄録即日書寫條例天官位號依科玄録若上刺當言以時刺若付度即言以某時付度即以某時拜請三元九天官付度今重表上啓无極大道元始太上玉皇无上至眞大聖天尊金闕玉帝陛下仙都眞官考召行狀都官使者伏願眞慈下降玄察監度某等上元九天眞靈玄録皆當依位列度某等身中安宫鎮府周帀營衛左轉九千萬重右轉九千萬重防某等身護某等命光明映曜威風萬里將軍兵士天官將吏與某同形神洞内外爲是所履土地眞官注氣監察考召諸官軍等共相輔佐當隨功遷賞不負效信所啓上御无極大道至眞玉皇御前畢再拜便奏章章竟即重勑言奏章功金明七眞重勑身中衆眞功曹天官將吏兵士都官使者飛天白虎送章仙龍騎吏等七眞向出官言奏章表事玄所部衆眞各廻騰虚駕還復宫府安鎮本位營天輔地廻備七眞身中百千萬重天宫正眞各從朱門妙闕而還職位七眞所啓上御道前畢即再拜廻案向北長跪重出官玄即付度治録也金明七眞重勑身中五眞郎吏左右功平仙伯仙公直眞符吏仙都玉郎正一昇玄功曹考召都官條檢仙王使者飛天乘騎直眞飛龍騎騰龍驛呈飛仙羽騎各三十六人出嚴莊整服列侍天儀蓋天彌地方位左右依法領押監察列付某等所受上元眞靈三百六十五部將軍兵士天官將吏付度某等身中安鎮三百六十五關節宫府周備億千萬重勿令錯誤營備某等與衆眞合同七眞所啓徑上无極大道至眞玉皇御前畢即讀度録天宫付授也畢即勑録次勑録符文祝曰大道開眞正法堂堂太无威風无中發光太无神功功化十方太玄眞符攝召神王无上制御萬禍摧亡九天扶命六天敢當諸天擁護彌劫相防急急如太上玉皇律令次勑度録水文祝曰太上碧水涌天河化爲神氣如天羅飛灑如劎斬天魔五方鬼兵當者皆消如風如火滅精蕩妖急急如律令畢度録即言功次三上香廻案東向跪言功金明七眞上啓无極大道元始太上至眞大聖天尊向所七眞身中五眞郎吏左右功平仙伯仙公直眞符吏仙都玉郎正一昇玄功曹考召都官條檢仙王者飛天乘騎直眞飛龍騎騰龍驛呈飛仙羽騎等監察付度某法事以玄請舉遷言功各當加眞高位天爵萬重皆如金簡功償受遷事畢各廻靈騰駕還復玄宫金堂玉府周鎮三元並如先位須後召復出七眞所付度某等上元九天眞靈三百六十五部玄録將軍兵士天官符吏從今以去與某等常相鎮守彌劫長存七眞啓奏上聞无極大道至眞玉皇御前畢即再拜復爐竟使出次復爐左右香官飛仙驛龍乘騎捧香使者飛天龍騎等當使靈壇上生自然金輝寳耀玄映玉瑛金液之精使某受道福慶自在天下受恩十方玉童玉女侍衛香烟徑奏七眞所啓无極大道至眞玉皇御前右度録刺狀章某郡縣鄉里男女生王甲年如干歲右如干人今投辭請受上元九天三百六十五部玄録請給謹狀某郡縣鄉里男女童子年如干歲右如干人今投辭請受无上九天玉仙一將軍童子玄録請給謹狀錢二百薪五束右受三百六十五部玄録信物如左錢二百薪一束右受童子玄録信物如左清玄无極正一玄氣係天尊長明金眞玉皇治左清眞玄氣九萬九千九百九十九重流明玉天眞人右積陽元氣八萬八千八百八十八重金玄寳光眞人中玄生靈清妙无央眞氣百千萬重玉玄金元眞人都領上景清虚自然生神妙氣九億九萬九千九百九十九重氣領三十六洞天至眞虛玄丈人領高上玉皇三十六眞皇正治都監十方无玉司法王金明七眞子稽首再拜高上眞威正氣謹案元科今有男女生等先蒙師眞啓拔賜署天官治職進叨上道三洞妙法非分佩恩寳衘罔極大道洪澤但某生長濁俗命屬三災爲非染惡習與性成身心不謹負越禁誡罪積丘嶽過深淵海自罹咎釁莫大之愆伏聞大道慈眞普育恩備十方海納萬流恩沾三界六道光潤无物不備某等貪進忘退無以自濟謹以投辭玄眞歸命三尊乞受上元九天眞靈三百六十五部玄録將軍兵士天官將吏永濟長河之津佩法之後當依科奉行敢有違七眞見某等稽顙不止即加署天官謹依某等郡縣鄉里姓名年紀即日逆刺上言章表天官位號如前事狀伏願无極大道无上金闕玉帝至眞大聖降勑三天仙都署仙玉郎九天眞王監眞度命使者攝召天官分别正位剋以今月某日付度某等依法拜署竭言上刺奏御无極大道御前金明七眞稽首再拜白刺上詣太无上九天金闕玉帝考召清眞正氣太歲某月日子時金明七眞於某郡縣鄉里白刺太玄上九天无上眞明大衆至眞降遣右度録章儀清玄无極正一玄氣係天尊某治氣金明七眞稽首再拜高上眞威正氣謹按玄科今有男女生等如干人投辭稽顙求受上元九天眞靈三百六十五部玄録七眞以今月某日依科署某等天官列位如前事狀逆刺表章上御道前伏願无極大道至眞大聖太上天尊垂神玄監慈眞降下開度某等得濟苦海之難永爲身寳願勑九天高上玉皇監眞使者玄都仙皇監盟玉郎使者十方飛天開度玉司神仙羽郎使者无上三天金闕玉帝消災道眞公使者一合來下天眞乘騎蓋天彌地流精電轉掃蕩六天羣非攝召三界神官共下監臨開度某等上元九天眞靈三百六十五部玄録將軍兵士天官將吏條列付度永鎮某等身中三百六十五宫室无令失次七眞伏地拜上紙章一通恩惟无極大道无上金闕玉帝至眞大聖哀愍七眞所表隨事分别清眞玄氣生靈神化之功天眞官屬付度某等常審營衞流光電轉布在宫室長爲某等身寳謹因直眞符吏飛龍乘騎飛天玉郎送章飛眞白虎神龍騎吏等各千二百驛章文上奏无上至眞玉帝御前金明七眞稽首再拜以聞金明七眞子屬金相洞明玉國九眞鄉上景金輪里泰清如法太歲年月日子時於某里中拜上上元九天眞靈出官儀百姓救急請福上章通用次入靜東向再拜夜即北向言奏次長跪案前三捻香畢即起立次鳴天皷二十四通次發爐清玄无極眞上三天玄元始炁无極大道太上老君左右香官飛仙驛龍乘騎捧香使者飛天龍騎五帝侍香玉童玉女等各二十四人出上啓虚无自然元始天尊某正𠇍燒香表奏某章願得太上十方正眞生炁降甲身中所啓逕上无極大道至眞玉皇御前畢即再拜長跪香案前出官奏章謹出某眞人弟子甲身中五體眞官功曹使者各二人出上元九天功曹官各二人出上元九天昇玄功曹官各二人出上元九天左玄眞明功曹官各二人出上元九天右玄太眞功曹官各二人出上元九天陽神正一功曹官各二人出上元九天陰神正一功曹官各二人出上元九天上仙都治病功曹官各二人出上元九天上靈飛騰天丁力士官各二人出上元九天上靈飛騰誅符破廟金剛力士官各二人出上元九天上靈飛騰收魔伐殺力士官各二人出上元九天上靈飛騰收神食鬼力士官各二人出上元九天上靈飛騰收精食毒力士官各二人出上元九天上靈飛天考召力士官各二人出上元九天上靈飛天郎吏飛符攝召力士官各二人出上元九天上靈飛天赤飄金車羽郎官各二人出无上上元九天上靈飛天白虎送章仙龍騎吏官各二人出謹出甲身中眞官使者仙都直眞符吏領仙都官使者各千二百人出嚴莊整服冠帶垂纓各整天眞羽儀羅列四面八方營衞甲左右前後流明耀電彌天蓋地掃除不祥神光朗焕某所住宫宅玄鑒所啓今有某郡縣鄉里某甲男女生民當隨事口啓言奏云謹因甲拜請天官上紙章一通乞爲某解釋千愆萬責或某事云云和怨扶對消災散禍除凶滅𦍙皆得剔然某家所犯衰厄咸蒙原赦疾病差愈百福莊嚴所向利貞悉得元吉慈眞降覆某家合門受恩甲今上啓无極大道元始太上玉皇无上至直大聖天尊金闕玉帝陛下九老仙都君九氣丈人上靈仙都眞官考召行狀都官使者高上法王无上八元天師願勅下十方諸天八極五方監察考召三元四始甲子諸官七十二官君赤陽丙丁三十六諸官天地山嶽河淮濟瀆九江八海一切諸靈官屬當考召此間土地眞官注氣社里邑君各當奉勑符命爲某隨事關啓章聞必使上達不得拘留致停公文天神地祇更相營衛若有六天下官故氣彊𦍙不正之神於道斷截章文不使上達天官吏兵即依仙都三天玄都正律收付天一北太陰之獄必使上啓逕奏无極大道至眞玉皇御前畢即再拜便奏章章竟即重勑言功次言功甲重勑身中衆眞功曹天官將吏兵士都官使者飛天白虎送章仙龍騎吏等甲向所出天官爲某爲某隨事言奏章一通露表事竟願某家因是功德開度九玄七祖於斯㧞對五道原赦十苦八難三塗之謫存亡皆蒙濟度昇天受福南宫衣厨自然慶流某家門大小所疾除愈或某事解釋夢想眞正爲是從來所爲作禍精靈鬼魅五方疫毒雲中遊獵魍魎浮遊諸凶鬼伍咸當從今滅爽萬禍不生百福莊嚴永享元吉令甲所化者化所治者愈所伏者伏咸共營衛甲所部衆眞天官各廻騰虚駕還復宫闕金城玉府安鎮本位營天輔地周備甲身中有千二萬重天官正眞各從朱門妙闕而還職位甲所啓上御无極大道前畢即再拜次復鑪左右香官飛仙驛龍乘騎捧香使者飛天龍騎等當使靈壇靜室之上内外自然生金暉寳耀玄映玉瑛金液之精某家福慶自在天下受恩十方玉童玉女侍衛香煙逕奏甲所啓啓无極大道至眞玉皇御前畢即便出金明曰七眞受高上玄録即金口所訣以爲立成儀典并付度科格共爲此一卷也玄録者其運常隨七眞自然之運以輔三十六眞皇正治御於賢劫在乎兹也十方天人若不知萬道勢訖者兆但看僞科罷除即三洞瑩發眞經洞明焕徹清夷光淨日景有若法鏡矣正道運行矣法乘運功矣即是洞經興矣法教於斯盛矣萬魔降矣當爾之時天不受祭神不受祠鬼不受食妖精匿矣淫害滅矣六天正矣野道伏矣當爾之時眞爲慶也十方天人豈不樂哉今粗述後篇而以證矣傳告後賢勿析斯卷以分别出外更爲卷軸也有犯者獲罪於風刀可不愼之若欲傳授但尋斯文自不越宗矣愼以自可戒之乎玉皇眞㫖自不可有違七眞經身實不敢負聖教焉泰玄正眞玄元清玄无極眞上天君眞明天君无上天君太上大道君億千萬重眞玄生炁道君太上老君太上丈人九老仙都君百千萬重道氣君眞天陛下六十一字泰清玄元清玄无極眞上天尊眞明大衆天尊无上金明天尊上玄億千萬重仙玄生氣无極大道天君三元生氣百千萬重道氣君九老眞仙丈人金明闕下六十一字右二件不出此卷讀之未究權置此耳大章用後小章用前也上清金眞玉皇上元九天眞靈三百六十五部元録
